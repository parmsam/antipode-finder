<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Earth circle -->
  <circle cx="16" cy="16" r="14" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Line through Earth -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Origin dot (blue) -->
  <circle cx="7" cy="16" r="4" fill="#3b82f6" stroke="#fff" stroke-width="1.5"/>
  <!-- Antipode dot (orange) -->
  <circle cx="25" cy="16" r="4" fill="#f97316" stroke="#fff" stroke-width="1.5"/>
</svg>
